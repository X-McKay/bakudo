[tools]
rust = "stable"
just = "latest"

[tasks.check]
run = "cargo fmt --all -- --check && cargo clippy --workspace -- -D warnings && cargo test --workspace"
description = "Full CI check: format, lint, and tests (used by pre-commit hook)"

[tasks."hooks:install"]
run = """
mkdir -p .git/hooks
cat > .git/hooks/pre-commit << 'HOOK'
#!/bin/bash
# Managed by mise — do not edit manually.
# Reinstall with: mise run hooks:install
exec mise run check
HOOK
chmod +x .git/hooks/pre-commit
echo "pre-commit hook installed"
"""
description = "Install git pre-commit hook that runs through mise"
