# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
#
# Run with: cargo deny check    (or `just deny`)
# Install:  cargo install --locked cargo-deny
#
# Schema v2 (cargo-deny 0.18+). See abox/deny.toml for annotated guidance;
# this file intentionally mirrors its shape so a dev jumping between the two
# repos finds the same shape.

[advisories]
version = 2
# Only flag unmaintained crates reachable from our workspace.
unmaintained = "workspace"
# Warn (not fail) on yanked crates so a yank upstream doesn't break CI mid-flight.
yanked = "warn"
# Advisory IDs explicitly accepted as known-and-tracked exceptions. Each entry
# must include a comment explaining why it is here and the condition for
# removing it (typically: upstream ships a fix). Do not add to this list
# without a written rationale.
ignore = []

[licenses]
version = 2
# Allow only these license families. Anything else causes the check to fail.
#
# MPL-2.0: file-level weak copyleft. Linking an MPL-2.0 library into a
# non-MPL binary is permitted; the obligations apply only to modifications
# of MPL-2.0 files themselves (common industry position).
#
# CDLA-Permissive-2.0: the Linux Foundation's permissive data license
# (used by webpki-roots). Functionally equivalent to MIT/Apache-2.0 for a
# compiled binary.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
# Require SPDX expressions to be at least 80% confident before accepting.
confidence-threshold = 0.8

[bans]
# Warn (not deny) on multiple versions of the same crate — pressure on
# dependency bloat without blocking merges when transitive graphs force it.
multiple-versions = "warn"
# Never allow wildcard version requirements in external deps.
wildcards = "deny"
# Do allow wildcards for workspace-internal path deps — the idiomatic
# pattern for unpublished intra-workspace crates.
allow-wildcard-paths = true

[sources]
# Only crates.io, no random git deps.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
