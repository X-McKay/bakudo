name = "opencode-mission"
engine = "opencode"
posture = "mission"
engine_args = ["run"]
abox_profile = "dev-strict"
system_prompt_file = "prompts/mission.md"

[wake_budget]
tool_calls = 60
wall_clock = "10m"
debounce = "1.5s"

[resume]
flag = "--resume"
session_id_file = ".bakudo/sessions/{mission_id}.id"

[worker]
engine = "opencode"
engine_args = ["run"]
abox_profile = "worker"
allow_all_tools = true
timeout_secs = 1800
max_output_bytes = 1048576
memory_mib = 4096
cpus = 2
