name = "opencode-explore"
engine = "opencode"
posture = "explore"
engine_args = ["run"]
allow_all_tools = true
abox_profile = "dev-broad"
system_prompt_file = "prompts/explore.md"

[wake_budget]
tool_calls = 30
wall_clock = "5m"
debounce = "1.5s"

[worker]
engine = "opencode"
engine_args = ["run"]
abox_profile = "worker"
allow_all_tools = true
timeout_secs = 1800
max_output_bytes = 1048576
memory_mib = 4096
cpus = 2
