name = "claude-mission"
engine = "claude-code"
posture = "mission"
engine_args = ["-p"]
allow_all_tools = true
abox_profile = "dev-strict"
system_prompt_file = "prompts/mission.md"

[wake_budget]
tool_calls = 60
wall_clock = "10m"
debounce = "1.5s"

[worker]
engine = "claude-code"
engine_args = ["-p"]
abox_profile = "worker"
allow_all_tools = true
timeout_secs = 1800
max_output_bytes = 1048576
memory_mib = 4096
cpus = 2
